<style>
/* --- Variáveis de Tema (Claro e Escuro) --- */
:root {
    --bg-main: #ffffff;
    --bg-sidebar: #f7f7f8;
    --bg-input: #ffffff;
    --bg-hover: #ececf1;
    --border-color: #e5e5e5;
    --text-primary: #1a1a1a;
    --text-secondary: #6e6e73;
    --accent-color: #000000;
    --accent-text: #ffffff;
    --error-bg: #fef2f2;
    --error-text: #dc2626;
    --user-msg-bg: #f0f0f0;
    --ai-msg-bg: #000000;
    --ai-msg-text: #ffffff;
}

html.dark {
    --bg-main: #0a0a0a;
    --bg-sidebar: #141414;
    --bg-input: #141414;
    --bg-hover: #27272a;
    --border-color: #27272a;
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --accent-color: #ffffff;
    --accent-text: #000000;
    --error-bg: #450a0a;
    --error-text: #f87171;
    --user-msg-bg: #27272a;
    --ai-msg-bg: #9333ea; /* Roxo no dark mode */
    --ai-msg-text: #ffffff;
}

/* --- Reset e Base --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: var(--bg-main);
    color: var(--text-primary);
    transition: background-color 0.3s, color 0.3s;
    height: 100vh;
    overflow: hidden;
    display: flex;
}

button {
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    font-family: inherit;
}

input {
    font-family: inherit;
}

/* --- Utilitários --- */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.w-full { width: 100%; }
.h-full { height: 100%; }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* --- Tela de Autenticação --- */
#auth-screen {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
}

.auth-card {
    background-color: var(--bg-sidebar);
    border: 1px solid var(--border-color);
    padding: 2rem;
    border-radius: 1rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.auth-title {
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.auth-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.875rem;
    margin-bottom: 2rem;
}

.input-group { margin-bottom: 1rem; }
.input-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.375rem;
}

.input-field {
    width: 100%;
    background-color: var(--bg-main);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
}
.input-field:focus { border-color: var(--accent-color); }

.btn-primary {
    width: 100%;
    background-color: var(--accent-color);
    color: var(--accent-text);
    padding: 0.75rem;
    border-radius: 0.5rem;
    font-weight: 500;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.9; }

.auth-switch {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
}
.auth-switch button { color: var(--text-primary); font-weight: 500; }

.error-msg {
    color: var(--error-text);
    font-size: 0.875rem;
    text-align: center;
    margin-bottom: 1rem;
    font-weight: 500;
}

/* --- Layout Principal --- */
#app-screen {
    width: 100%;
    height: 100%;
    display: flex;
}

/* --- Sidebar --- */
.sidebar {
    width: 260px;
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    flex-shrink: 0;
    transition: transform 0.3s ease;
}

.sidebar-header {
    font-weight: bold;
    font-size: 1.125rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-new-chat {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.625rem;
    background-color: var(--accent-color);
    color: var(--accent-text);
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
}

.chat-list-title {
    font-size: 0.6875rem;
    text-transform: uppercase;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 0.75rem;
}

.chat-list {
    flex: 1;
    overflow-y: auto;
    margin: 0 -0.5rem;
    padding: 0 0.5rem;
}

.chat-item {
    padding: 0.625rem;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    margin-bottom: 0.25rem;
}
.chat-item:hover { background-color: var(--bg-hover); }
.chat-item.active { background-color: var(--bg-hover); font-weight: 500; }
.chat-item i { opacity: 0.5; width: 14px; height: 14px; }

.sidebar-footer {
    margin-top: 1rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.user-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.625rem;
    font-size: 0.875rem;
    font-weight: 500;
}

.btn-danger {
    width: 100%;
    text-align: left;
    padding: 0.625rem;
    border-radius: 0.375rem;
    color: #dc2626;
    font-size: 0.875rem;
}
html.dark .btn-danger { color: #f87171; }
.btn-danger:hover { background-color: var(--error-bg); }

/* --- Main Content --- */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
}

.header {
    height: 4rem;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    background-color: rgba(var(--bg-main), 0.8);
    backdrop-filter: blur(4px);
    z-index: 10;
}

.header-title-container {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.header-title { font-size: 0.875rem; font-weight: 500; }

.btn-rename {
    padding: 0.25rem;
    border-radius: 0.25rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
}
.btn-rename:hover { background-color: var(--bg-hover); color: var(--text-primary); }

.header-actions { display: flex; align-items: center; gap: 0.75rem; }

.theme-toggle, .mobile-menu-btn {
    padding: 0.5rem;
    border-radius: 50%;
    color: var(--text-secondary);
}
.theme-toggle:hover, .mobile-menu-btn:hover { background-color: var(--bg-hover); color: var(--text-primary); }

.status-badge {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 0.25rem 0.5rem;
    border: 1px solid var(--border-color);
    border-radius: 999px;
}
.status-dot { width: 6px; height: 6px; background-color: #10a37f; border-radius: 50%; }

/* --- Chat Area --- */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
}

.chat-content {
    max-width: 768px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
}

.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 1.5rem;
    max-width: 600px;
    margin: 0 auto;
}
.empty-title { font-size: 1.875rem; font-weight: bold; }
.empty-desc { color: var(--text-secondary); font-size: 0.875rem; }
.suggestions { display: grid; grid-template-columns: 1fr; gap: 0.75rem; width: 100%; }
@media (min-width: 640px) { .suggestions { grid-template-columns: 1fr 1fr; } }
.suggestion-btn {
    padding: 1rem;
    text-align: left;
    border: 1px solid var(--border-color);
    border-radius: 0.75rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
    transition: all 0.2s;
}
.suggestion-btn:hover { background-color: var(--bg-hover); color: var(--text-primary); }

.message { display: flex; gap: 1rem; }
.avatar {
    width: 32px;
    height: 32px;
    border-radius: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: bold;
    flex-shrink: 0;
}
.avatar.user { background-color: var(--user-msg-bg); color: var(--text-primary); }
.avatar.ai { background-color: var(--ai-msg-bg); color: var(--ai-msg-text); }

.message-body { flex: 1; min-width: 0; padding-top: 0.25rem; }
.message-time { font-size: 0.625rem; color: var(--text-secondary); margin-top: 0.5rem; font-weight: 500; }

/* Markdown Styles */
.prose { font-size: 0.875rem; line-height: 1.6; color: var(--text-primary); }
.prose p { margin-bottom: 0.75rem; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { font-weight: 600; }
.prose em { font-style: italic; }
.prose h1, .prose h2, .prose h3 { font-weight: bold; margin: 1rem 0 0.5rem 0; }
.prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
.prose ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
.prose code { background-color: var(--bg-hover); padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
.prose pre { background-color: var(--bg-hover); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 0.75rem; }
.prose pre code { background-color: transparent; padding: 0; }

.loading-indicator { display: flex; gap: 1rem; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
.loading-bars { flex: 1; padding-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.loading-bar { height: 1rem; background-color: var(--bg-hover); border-radius: 0.25rem; }
.loading-bar:nth-child(1) { width: 75%; }
.loading-bar:nth-child(2) { width: 50%; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.error-banner {
    background-color: var(--error-bg);
    border: 1px solid rgba(220, 38, 38, 0.2);
    color: var(--error-text);
    padding: 1rem;
    border-radius: 0.75rem;
    font-size: 0.875rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
}

/* --- Input Area --- */
.input-area {
    padding: 1rem;
    background-color: var(--bg-main);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.input-wrapper {
    width: 100%;
    max-width: 720px;
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 0.75rem;
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
html.dark .input-wrapper { box-shadow: none; }

.chat-input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 0.875rem;
    padding: 0.5rem 0;
    outline: none;
}
.chat-input::placeholder { color: var(--text-secondary); }

.btn-send {
    color: var(--text-primary);
    opacity: 0.3;
    padding: 0.25rem;
    transition: opacity 0.2s;
}
.btn-send:not(:disabled):hover { opacity: 1; }
.btn-send:disabled { opacity: 0.1; cursor: not-allowed; }

.footer-text {
    font-size: 0.6875rem;
    color: var(--text-secondary);
    margin-top: 0.75rem;
    text-align: center;
    font-weight: 500;
}

/* --- Mobile Responsiveness --- */
.mobile-menu-btn { display: none; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
    .mobile-menu-btn { display: block; }
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0,0,0,0.5);
        z-index: 40;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
    .header { padding: 0 0.75rem; }
    .chat-container { padding: 1rem; }
}
</style>
</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-title">
                <div style="width: 12px; height: 12px; background: var(--accent-color); border-radius: 50%;"></div>
                NEXUS UNBOUND
            </div>
            <p class="auth-subtitle" id="auth-subtitle">Faça login para continuar</p>

            <form id="auth-form">
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" id="auth-username" class="input-field" placeholder="Seu nome de usuário" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="auth-password" class="input-field" placeholder="Sua senha" required>
                </div>
                <div class="input-group" id="api-key-group">
                    <label>Chave da API Gemini (Apenas no Cadastro)</label>
                    <input type="password" id="auth-apikey" class="input-field" placeholder="AIzaSy...">
                </div>

                <div id="auth-error" class="error-msg hidden"></div>

                <button type="submit" class="btn-primary" id="auth-submit-btn">Entrar</button>
            </form>

            <div class="auth-switch">
                <button id="auth-switch-btn">Não tem uma conta? Cadastre-se</button>
            </div>
        </div>
    </div>

    <!-- TELA DO APLICATIVO -->
    <div id="app-screen" class="hidden">
        
        <!-- Overlay Mobile -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div style="width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%;"></div>
                NEXUS UNBOUND
                <button id="close-sidebar-btn" class="mobile-menu-btn" style="margin-left: auto;"><i data-lucide="x"></i></button>
            </div>

            <button id="new-chat-btn" class="btn-new-chat">
                <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Nova Conversa
            </button>

            <div class="chat-list-title">Recentes</div>
            <div id="chat-list" class="chat-list">
                <!-- Lista de chats injetada via JS -->
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="flex items-center gap-2">
                        <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                        <span id="current-username-display" class="truncate" style="max-width: 120px;">User</span>
                    </div>
                    <button id="logout-btn" title="Sair"><i data-lucide="log-out" style="width: 16px; height: 16px; color: var(--text-secondary);"></i></button>
                </div>
                <button id="clear-history-btn" class="btn-danger">Limpar Histórico</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar-btn" class="mobile-menu-btn"><i data-lucide="menu"></i></button>
                    <div class="header-title-container">
                        <div id="header-chat-title" class="header-title truncate" style="max-width: 200px;">Nova Conversa</div>
                        <button id="rename-chat-btn" class="btn-rename hidden" title="Renomear Conversa">
                            <i data-lucide="edit-2" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-btn" class="theme-toggle" title="Alternar Tema">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        <span class="hidden sm:inline" style="display: inline-block;">Dual Persona</span>
                    </div>
                </div>
            </header>

            <div id="chat-container" class="chat-container">
                <div id="chat-content" class="chat-content">
                    <!-- Mensagens ou Empty State injetados via JS -->
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form" class="w-full" style="display: flex; justify-content: center;">
                    <div class="input-wrapper">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Envie uma mensagem..." autocomplete="off">
                        <button type="submit" id="send-btn" class="btn-send" disabled>
                            <i data-lucide="send" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </form>
                <div class="footer-text">
                    Nexus v4.2 • Memória Oculta Inteligente Ativada
                </div>
            </div>
        </main>
    </div>
    
        <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script type="module" src="script.js"></script>

</body>
</html>
