<style>
/* --- Variáveis de Tema (Claro e Escuro) --- */
:root {
    --bg-main: #0a0a0a;
    --bg-card: #141414;
    --accent-color: #ffffff;
    --text-main: #ffffff;
    --text-secondary: #a0a0a0;
    --border-color: #262626;
    --user-msg: #1a1a1a;
    --ai-msg: #0f0f0f;
    --error-color: #ff4444;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, sans-serif;
}

body {
    background: var(--bg-main);
    color: var(--text-main);
    height: 100vh;
    overflow: hidden;
}

.hidden { display: none !important; }

/* --- AUTENTICAÇÃO --- */
#auth-screen {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: var(--bg-main);
}

.auth-card {
    background: var(--bg-card);
    padding: 2rem;
    border-radius: 12px;
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--border-color);
}

.auth-title {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
}

.input-group { margin-bottom: 1rem; }
.input-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.4rem; }

.input-field {
    width: 100%;
    background: #000;
    border: 1px solid var(--border-color);
    padding: 0.75rem;
    border-radius: 8px;
    color: #fff;
    outline: none;
}

.btn-primary {
    width: 100%;
    background: var(--accent-color);
    color: #000;
    border: none;
    padding: 0.75rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 1rem;
}

/* --- APP LAYOUT --- */
#app-screen {
    display: flex;
    height: 100vh;
    width: 100%;
}

.sidebar {
    width: 260px;
    background: #050505;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    transition: all 0.3s ease;
}

.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    width: 100%;
    background: var(--bg-main);
}

/* --- CHAT AREA --- */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 2rem;
}

.chat-content {
    width: 100%;
    max-width: 900px; /* Ocupa bem a tela */
    margin: 0 auto;
    padding: 1rem;
}

.message {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
    animation: fadeIn 0.3s ease;
}

.message.user { justify-content: flex-end; flex-direction: row-reverse; }

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    flex-shrink: 0;
}

.avatar.ai { background: var(--accent-color); color: #000; }
.avatar.user { background: #333; color: #fff; }

.message-body {
    max-width: 85%;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 0.95rem;
}

.ai .message-body { background: var(--ai-msg); border: 1px solid var(--border-color); }
.user .message-body { background: var(--user-msg); border: 1px solid var(--border-color); }

/* --- INPUT AREA --- */
.input-area {
    padding: 1.5rem;
    background: linear-gradient(transparent, var(--bg-main) 20%);
}

.input-wrapper {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    display: flex;
    gap: 0.5rem;
}

.chat-input {
    flex: 1;
    background: #141414;
    border: 1px solid var(--border-color);
    padding: 0.8rem 1rem;
    border-radius: 12px;
    color: #fff;
    outline: none;
}

/* --- AJUSTE PARA CELULAR (AQUI ESTÁ A MÁGICA) --- */
@media (max-width: 768px) {
    .sidebar {
        position: fixed;
        left: -260px;
        z-index: 100;
        height: 100%;
    }
    
    .sidebar.open {
        left: 0;
    }

    .main-content {
        margin-left: 0 !important;
        width: 100vw;
    }

    .header {
        padding: 0.5rem 1rem;
    }
}

.header {
    height: 60px;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    background: rgba(10, 10, 10, 0.8);
    backdrop-filter: blur(10px);
}

.mobile-menu-btn {
    background: none;
    border: none;
    color: #fff;
    cursor: pointer;
}

</style>
</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-title">
                <div style="width: 12px; height: 12px; background: var(--accent-color); border-radius: 50%;"></div>
                NEXUS UNBOUND
            </div>
            <p class="auth-subtitle" id="auth-subtitle">Faça login para continuar</p>

            <form id="auth-form">
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" id="auth-username" class="input-field" placeholder="Seu nome de usuário" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="auth-password" class="input-field" placeholder="Sua senha" required>
                </div>
                <div class="input-group" id="api-key-group">
                    <label>Chave da API Gemini (Apenas no Cadastro)</label>
                    <input type="password" id="auth-apikey" class="input-field" placeholder="AIzaSy...">
                </div>

                <div id="auth-error" class="error-msg hidden"></div>

                <button type="submit" class="btn-primary" id="auth-submit-btn">Entrar</button>
            </form>

            <div class="auth-switch">
                <button id="auth-switch-btn">Não tem uma conta? Cadastre-se</button>
            </div>
        </div>
    </div>

    <!-- TELA DO APLICATIVO -->
    <div id="app-screen" class="hidden">
        
        <!-- Overlay Mobile -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div style="width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%;"></div>
                NEXUS UNBOUND
                <button id="close-sidebar-btn" class="mobile-menu-btn" style="margin-left: auto;"><i data-lucide="x"></i></button>
            </div>

            <button id="new-chat-btn" class="btn-new-chat">
                <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Nova Conversa
            </button>

            <div class="chat-list-title">Recentes</div>
            <div id="chat-list" class="chat-list">
                <!-- Lista de chats injetada via JS -->
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="flex items-center gap-2">
                        <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                        <span id="current-username-display" class="truncate" style="max-width: 120px;">User</span>
                    </div>
                    <button id="logout-btn" title="Sair"><i data-lucide="log-out" style="width: 16px; height: 16px; color: var(--text-secondary);"></i></button>
                </div>
                <button id="clear-history-btn" class="btn-danger">Limpar Histórico</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar-btn" class="mobile-menu-btn"><i data-lucide="menu"></i></button>
                    <div class="header-title-container">
                        <div id="header-chat-title" class="header-title truncate" style="max-width: 200px;">Nova Conversa</div>
                        <button id="rename-chat-btn" class="btn-rename hidden" title="Renomear Conversa">
                            <i data-lucide="edit-2" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-btn" class="theme-toggle" title="Alternar Tema">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        <span class="hidden sm:inline" style="display: inline-block;">Dual Persona</span>
                    </div>
                </div>
            </header>

            <div id="chat-container" class="chat-container">
                <div id="chat-content" class="chat-content">
                    <!-- Mensagens ou Empty State injetados via JS -->
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form" class="w-full" style="display: flex; justify-content: center;">
                    <div class="input-wrapper">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Envie uma mensagem..." autocomplete="off">
                        <button type="submit" id="send-btn" class="btn-send" disabled>
                            <i data-lucide="send" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </form>
                <div class="footer-text">
                    Nexus v4.2 • Memória Oculta Inteligente Ativada
                </div>
            </div>
        </main>
    </div>
    
        <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script type="module" src="script.js"></script>

</body>
</html>
