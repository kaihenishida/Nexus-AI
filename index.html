<style>
/* --- Variáveis de Tema (Claro e Escuro) --- */
:root {
    --bg-main: #0a0a0a;
    --bg-card: #111111;
    --accent-color: #ffffff;
    --accent-glow: rgba(255, 255, 255, 0.15);
    --text-main: #ffffff;
    --text-secondary: #a0a0a0;
    --border-color: #262626;
    --user-msg: #1a1a1a;
    --ai-msg: #0f0f0f;
    --error-bg: rgba(255, 68, 68, 0.1);
    --error-text: #ff4444;
}

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }

body { background: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }

.hidden { display: none !important; }

/* --- SIDEBAR --- */
.sidebar {
    width: 260px;
    background: #050505;
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    height: 100%;
    flex-shrink: 0;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.sidebar-header { padding: 1.5rem; font-weight: 800; font-size: 0.85rem; letter-spacing: 1px; display: flex; align-items: center; gap: 0.5rem; border-bottom: 1px solid var(--border-color); }

.btn-new-chat { margin: 1rem; padding: 0.75rem; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }

.chat-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
.chat-item { padding: 0.75rem; border-radius: 8px; font-size: 0.9rem; cursor: pointer; color: var(--text-secondary); display: flex; align-items: center; gap: 0.75rem; margin-bottom: 2px; }
.chat-item.active { background: #1a1a1a; color: #fff; }

/* --- MAIN CONTENT --- */
.main-content { flex: 1; display: flex; flex-direction: column; width: 100%; background: var(--bg-main); position: relative; }

.header { height: 60px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; background: rgba(10,10,10,0.8); backdrop-filter: blur(10px); z-index: 10; }

/* --- CHAT AREA --- */
.chat-container { flex: 1; overflow-y: auto; width: 100%; scroll-behavior: smooth; }
.chat-content { width: 100%; max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }

.empty-state { text-align: center; margin-top: 4rem; padding: 1rem; }
.empty-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.empty-desc { color: var(--text-secondary); margin-bottom: 2rem; font-size: 0.9rem; }

.suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; max-width: 600px; margin: 0 auto; }
.suggestion-btn { background: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); padding: 1rem; border-radius: 12px; font-size: 0.8rem; cursor: pointer; text-align: left; transition: 0.2s; }
.suggestion-btn:hover { border-color: #555; background: #1a1a1a; }

/* --- MESSAGES --- */
.message { display: flex; gap: 1rem; margin-bottom: 2rem; width: 100%; }
.avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
.avatar.ai { background: #fff; color: #000; }
.avatar.user { background: #333; color: #fff; }
.message-body { flex: 1; line-height: 1.6; font-size: 0.95rem; }
.prose { color: #e5e5e5; }
.message-time { font-size: 0.7rem; color: #555; margin-top: 0.5rem; }

/* --- INPUT --- */
.input-area { padding: 1.5rem 1rem; width: 100%; }
.input-wrapper { width: 100%; max-width: 800px; margin: 0 auto; position: relative; display: flex; align-items: center; background: #141414; border: 1px solid var(--border-color); border-radius: 16px; padding: 0.5rem 0.75rem; }
.chat-input { flex: 1; background: transparent; border: none; color: #fff; padding: 0.75rem; outline: none; font-size: 1rem; }
.btn-send { background: #fff; color: #000; border: none; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.btn-send:disabled { background: #333; color: #666; cursor: not-allowed; }

/* --- AJUSTE CELULAR --- */
@media (max-width: 768px) {
    .sidebar { position: fixed; left: -260px; z-index: 1000; box-shadow: 20px 0 50px rgba(0,0,0,0.5); }
    .sidebar.open { left: 0; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
    .sidebar-overlay.open { display: block; }
    .main-content { margin-left: 0 !important; width: 100vw; }
    .suggestions { grid-template-columns: 1fr; }
    .header-title { font-size: 0.9rem; }
}

/* AUXILIARES */
.flex { display: flex; }
.items-center { align-items: center; }
.gap-3 { gap: 0.75rem; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.mobile-menu-btn { background: none; border: none; color: #fff; cursor: pointer; padding: 0.5rem; }


</style>
</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-title">
                <div style="width: 12px; height: 12px; background: var(--accent-color); border-radius: 50%;"></div>
                NEXUS UNBOUND
            </div>
            <p class="auth-subtitle" id="auth-subtitle">Faça login para continuar</p>

            <form id="auth-form">
                <div class="input-group">
                    <label>Usuário</label>
                    <input type="text" id="auth-username" class="input-field" placeholder="Seu nome de usuário" required>
                </div>
                <div class="input-group">
                    <label>Senha</label>
                    <input type="password" id="auth-password" class="input-field" placeholder="Sua senha" required>
                </div>
                <div class="input-group" id="api-key-group">
                    <label>Chave da API Gemini (Apenas no Cadastro)</label>
                    <input type="password" id="auth-apikey" class="input-field" placeholder="AIzaSy...">
                </div>

                <div id="auth-error" class="error-msg hidden"></div>

                <button type="submit" class="btn-primary" id="auth-submit-btn">Entrar</button>
            </form>

            <div class="auth-switch">
                <button id="auth-switch-btn">Não tem uma conta? Cadastre-se</button>
            </div>
        </div>
    </div>

    <!-- TELA DO APLICATIVO -->
    <div id="app-screen" class="hidden">
        
        <!-- Overlay Mobile -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div style="width: 8px; height: 8px; background: var(--accent-color); border-radius: 50%;"></div>
                NEXUS UNBOUND
                <button id="close-sidebar-btn" class="mobile-menu-btn" style="margin-left: auto;"><i data-lucide="x"></i></button>
            </div>

            <button id="new-chat-btn" class="btn-new-chat">
                <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Nova Conversa
            </button>

            <div class="chat-list-title">Recentes</div>
            <div id="chat-list" class="chat-list">
                <!-- Lista de chats injetada via JS -->
            </div>

            <div class="sidebar-footer">
                <div class="user-info">
                    <div class="flex items-center gap-2">
                        <i data-lucide="user" style="width: 16px; height: 16px;"></i>
                        <span id="current-username-display" class="truncate" style="max-width: 120px;">User</span>
                    </div>
                    <button id="logout-btn" title="Sair"><i data-lucide="log-out" style="width: 16px; height: 16px; color: var(--text-secondary);"></i></button>
                </div>
                <button id="clear-history-btn" class="btn-danger">Limpar Histórico</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="header">
                <div class="flex items-center gap-3">
                    <button id="open-sidebar-btn" class="mobile-menu-btn"><i data-lucide="menu"></i></button>
                    <div class="header-title-container">
                        <div id="header-chat-title" class="header-title truncate" style="max-width: 200px;">Nova Conversa</div>
                        <button id="rename-chat-btn" class="btn-rename hidden" title="Renomear Conversa">
                            <i data-lucide="edit-2" style="width: 14px; height: 14px;"></i>
                        </button>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="theme-toggle-btn" class="theme-toggle" title="Alternar Tema">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    <div class="status-badge">
                        <div class="status-dot"></div>
                        <span class="hidden sm:inline" style="display: inline-block;">Dual Persona</span>
                    </div>
                </div>
            </header>

            <div id="chat-container" class="chat-container">
                <div id="chat-content" class="chat-content">
                    <!-- Mensagens ou Empty State injetados via JS -->
                </div>
            </div>

            <div class="input-area">
                <form id="chat-form" class="w-full" style="display: flex; justify-content: center;">
                    <div class="input-wrapper">
                        <input type="text" id="chat-input" class="chat-input" placeholder="Envie uma mensagem..." autocomplete="off">
                        <button type="submit" id="send-btn" class="btn-send" disabled>
                            <i data-lucide="send" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                </form>
                <div class="footer-text">
                    Nexus v4.2 • Memória Oculta Inteligente Ativada
                </div>
            </div>
        </main>
    </div>
    
        <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script type="module" src="script.js"></script>

</body>
</html>
