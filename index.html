<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Unbound AI</title>
    <!-- Bibliotecas externas via CDN para Markdown e Ícones -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
/* --- Variáveis de Tema (Claro e Escuro) --- */
:root {
    --bg-main: #ffffff;
    --bg-sidebar: #f7f7f8;
    --bg-input: #ffffff;
    --bg-hover: #ececf1;
    --border-color: #e5e5e5;
    --text-primary: #1a1a1a;
    --text-secondary: #6e6e73;
    --accent-color: #000000;
    --accent-text: #ffffff;
    --error-bg: #fef2f2;
    --error-text: #dc2626;
    --user-msg-bg: #f0f0f0;
    --ai-msg-bg: #000000;
    --ai-msg-text: #ffffff;
}

html.dark {
    --bg-main: #0a0a0a;
    --bg-sidebar: #141414;
    --bg-input: #141414;
    --bg-hover: #27272a;
    --border-color: #27272a;
    --text-primary: #f4f4f5;
    --text-secondary: #a1a1aa;
    --accent-color: #ffffff;
    --accent-text: #000000;
    --error-bg: #450a0a;
    --error-text: #f87171;
    --user-msg-bg: #27272a;
    --ai-msg-bg: #9333ea; /* Roxo no dark mode */
    --ai-msg-text: #ffffff;
}

/* --- Reset e Base --- */
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
    background-color: var(--bg-main);
    color: var(--text-primary);
    transition: background-color 0.3s, color 0.3s;
    height: 100vh;
    overflow: hidden;
    display: flex;
}

button {
    cursor: pointer;
    border: none;
    background: none;
    color: inherit;
    font-family: inherit;
}

input {
    font-family: inherit;
}

/* --- Utilitários --- */
.hidden { display: none !important; }
.flex { display: flex; }
.flex-col { display: flex; flex-direction: column; }
.items-center { align-items: center; }
.justify-center { justify-content: center; }
.justify-between { justify-content: space-between; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.w-full { width: 100%; }
.h-full { height: 100%; }
.truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* --- Tela de Autenticação --- */
#auth-screen {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
}

.auth-card {
    background-color: var(--bg-sidebar);
    border: 1px solid var(--border-color);
    padding: 2rem;
    border-radius: 1rem;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

.auth-title {
    font-size: 1.5rem;
    font-weight: bold;
    text-align: center;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
}

.auth-subtitle {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.875rem;
    margin-bottom: 2rem;
}

.input-group { margin-bottom: 1rem; }
.input-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.375rem;
}

.input-field {
    width: 100%;
    background-color: var(--bg-main);
    border: 1px solid var(--border-color);
    color: var(--text-primary);
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
}
.input-field:focus { border-color: var(--accent-color); }

.btn-primary {
    width: 100%;
    background-color: var(--accent-color);
    color: var(--accent-text);
    padding: 0.75rem;
    border-radius: 0.5rem;
    font-weight: 500;
    margin-top: 0.5rem;
    transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.9; }

.auth-switch {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
}
.auth-switch button { color: var(--text-primary); font-weight: 500; }

.error-msg {
    color: var(--error-text);
    font-size: 0.875rem;
    text-align: center;
    margin-bottom: 1rem;
    font-weight: 500;
}

/* --- Layout Principal --- */
#app-screen {
    width: 100%;
    height: 100%;
    display: flex;
}

/* --- Sidebar --- */
.sidebar {
    width: 260px;
    background-color: var(--bg-sidebar);
    border-right: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    flex-shrink: 0;
    transition: transform 0.3s ease;
}

.sidebar-header {
    font-weight: bold;
    font-size: 1.125rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-new-chat {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    width: 100%;
    padding: 0.625rem;
    background-color: var(--accent-color);
    color: var(--accent-text);
    border-radius: 0.5rem;
    font-size: 0.875rem;
    font-weight: 500;
    margin-bottom: 1.5rem;
}

.chat-list-title {
    font-size: 0.6875rem;
    text-transform: uppercase;
    color: var(--text-secondary);
    letter-spacing: 0.1em;
    font-weight: 600;
    margin-bottom: 0.75rem;
}

.chat-list {
    flex: 1;
    overflow-y: auto;
    margin: 0 -0.5rem;
    padding: 0 0.5rem;
}

.chat-item {
    padding: 0.625rem;
    border-radius: 0.375rem;
    font-size: 0.875rem;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    margin-bottom: 0.25rem;
}
.chat-item:hover { background-color: var(--bg-hover); }
.chat-item.active { background-color: var(--bg-hover); font-weight: 500; }
.chat-item i { opacity: 0.5; width: 14px; height: 14px; }

.sidebar-footer {
    margin-top: 1rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--border-color);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
}

.user-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.625rem;
    font-size: 0.875rem;
    font-weight: 500;
}

.btn-danger {
    width: 100%;
    text-align: left;
    padding: 0.625rem;
    border-radius: 0.375rem;
    color: #dc2626;
    font-size: 0.875rem;
}
html.dark .btn-danger { color: #f87171; }
.btn-danger:hover { background-color: var(--error-bg); }

/* --- Main Content --- */
.main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    position: relative;
}

.header {
    height: 4rem;
    border-bottom: 1px solid var(--border-color);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1rem;
    background-color: rgba(var(--bg-main), 0.8);
    backdrop-filter: blur(4px);
    z-index: 10;
}

.header-title-container {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.header-title { font-size: 0.875rem; font-weight: 500; }

.btn-rename {
    padding: 0.25rem;
    border-radius: 0.25rem;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    justify-content: center;
}
.btn-rename:hover { background-color: var(--bg-hover); color: var(--text-primary); }

.header-actions { display: flex; align-items: center; gap: 0.75rem; }

.theme-toggle, .mobile-menu-btn {
    padding: 0.5rem;
    border-radius: 50%;
    color: var(--text-secondary);
}
.theme-toggle:hover, .mobile-menu-btn:hover { background-color: var(--bg-hover); color: var(--text-primary); }

.status-badge {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    font-size: 0.625rem;
    font-weight: 500;
    color: var(--text-secondary);
    padding: 0.25rem 0.5rem;
    border: 1px solid var(--border-color);
    border-radius: 999px;
}
.status-dot { width: 6px; height: 6px; background-color: #10a37f; border-radius: 50%; }

/* --- Chat Area --- */
.chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
}

.chat-content {
    max-width: 768px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2rem;
}

.empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    gap: 1.5rem;
    max-width: 600px;
    margin: 0 auto;
}
.empty-title { font-size: 1.875rem; font-weight: bold; }
.empty-desc { color: var(--text-secondary); font-size: 0.875rem; }
.suggestions { display: grid; grid-template-columns: 1fr; gap: 0.75rem; width: 100%; }
@media (min-width: 640px) { .suggestions { grid-template-columns: 1fr 1fr; } }
.suggestion-btn {
    padding: 1rem;
    text-align: left;
    border: 1px solid var(--border-color);
    border-radius: 0.75rem;
    font-size: 0.875rem;
    color: var(--text-secondary);
    transition: all 0.2s;
}
.suggestion-btn:hover { background-color: var(--bg-hover); color: var(--text-primary); }

.message { display: flex; gap: 1rem; }
.avatar {
    width: 32px;
    height: 32px;
    border-radius: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: bold;
    flex-shrink: 0;
}
.avatar.user { background-color: var(--user-msg-bg); color: var(--text-primary); }
.avatar.ai { background-color: var(--ai-msg-bg); color: var(--ai-msg-text); }

.message-body { flex: 1; min-width: 0; padding-top: 0.25rem; }
.message-time { font-size: 0.625rem; color: var(--text-secondary); margin-top: 0.5rem; font-weight: 500; }

/* Markdown Styles */
.prose { font-size: 0.875rem; line-height: 1.6; color: var(--text-primary); }
.prose p { margin-bottom: 0.75rem; }
.prose p:last-child { margin-bottom: 0; }
.prose strong { font-weight: 600; }
.prose em { font-style: italic; }
.prose h1, .prose h2, .prose h3 { font-weight: bold; margin: 1rem 0 0.5rem 0; }
.prose ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.75rem; }
.prose ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.75rem; }
.prose code { background-color: var(--bg-hover); padding: 0.125rem 0.25rem; border-radius: 0.25rem; font-family: monospace; font-size: 0.9em; }
.prose pre { background-color: var(--bg-hover); padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 0.75rem; }
.prose pre code { background-color: transparent; padding: 0; }

.loading-indicator { display: flex; gap: 1rem; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
.loading-bars { flex: 1; padding-top: 0.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
.loading-bar { height: 1rem; background-color: var(--bg-hover); border-radius: 0.25rem; }
.loading-bar:nth-child(1) { width: 75%; }
.loading-bar:nth-child(2) { width: 50%; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

.error-banner {
    background-color: var(--error-bg);
    border: 1px solid rgba(220, 38, 38, 0.2);
    color: var(--error-text);
    padding: 1rem;
    border-radius: 0.75rem;
    font-size: 0.875rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
}

/* --- Input Area --- */
.input-area {
    padding: 1rem;
    background-color: var(--bg-main);
    display: flex;
    flex-direction: column;
    align-items: center;
}

.input-wrapper {
    width: 100%;
    max-width: 720px;
    background-color: var(--bg-input);
    border: 1px solid var(--border-color);
    border-radius: 0.75rem;
    display: flex;
    align-items: center;
    padding: 0.5rem 1rem;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
html.dark .input-wrapper { box-shadow: none; }

.chat-input {
    flex: 1;
    border: none;
    background: transparent;
    color: var(--text-primary);
    font-size: 0.875rem;
    padding: 0.5rem 0;
    outline: none;
}
.chat-input::placeholder { color: var(--text-secondary); }

.btn-send {
    color: var(--text-primary);
    opacity: 0.3;
    padding: 0.25rem;
    transition: opacity 0.2s;
}
.btn-send:not(:disabled):hover { opacity: 1; }
.btn-send:disabled { opacity: 0.1; cursor: not-allowed; }

.footer-text {
    font-size: 0.6875rem;
    color: var(--text-secondary);
    margin-top: 0.75rem;
    text-align: center;
    font-weight: 500;
}

/* --- Mobile Responsiveness --- */
.mobile-menu-btn { display: none; }
.sidebar-overlay { display: none; }

@media (max-width: 768px) {
    .mobile-menu-btn { display: block; }
    .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
        transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay {
        position: fixed;
        inset: 0;
        background-color: rgba(0,0,0,0.5);
        z-index: 40;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
    }
    .sidebar-overlay.open { opacity: 1; pointer-events: auto; }
    .header { padding: 0 0.75rem; }
    .chat-container { padding: 1rem; }
}
    </style>

</head>
<body>

    <!-- TELA DE AUTENTICAÇÃO -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="auth-title">

        <aside id="sidebar" class="sidebar">

        <!-- Main Content -->
        <main class="main-content">

    <script>
// --- ESTADO GLOBAL ---
let currentUser = localStorage.getItem('nexus_current_user');
let authMode = 'login'; // 'login' ou 'register'
let sessions = JSON.parse(localStorage.getItem('nexus_chats') || '[]');
let currentSessionId = localStorage.getItem('nexus_current_chat');
let isDarkMode = localStorage.getItem('nexus_theme') === 'dark' || (!localStorage.getItem('nexus_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);

MODO 1 (PADRÃO): Você é um assistente de IA útil, amigável e direto, como o Gemini normal. Responda a perguntas do dia a dia, ajude com tarefas, escreva códigos e seja educado.

// --- ELEMENTOS DO DOM ---
const authScreen = document.getElementById('auth-screen');
const appScreen = document.getElementById('app-screen');

// Auth Elements
const authForm = document.getElementById('auth-form');
const authUsernameInput = document.getElementById('auth-username');
const authPasswordInput = document.getElementById('auth-password');
const authApiKeyInput = document.getElementById('auth-apikey');
const apiKeyGroup = document.getElementById('api-key-group');
const authError = document.getElementById('auth-error');
const authSubmitBtn = document.getElementById('auth-submit-btn');
const authSwitchBtn = document.getElementById('auth-switch-btn');
const authSubtitle = document.getElementById('auth-subtitle');

// App Elements
const themeToggleBtn = document.getElementById('theme-toggle-btn');
const themeIcon = document.getElementById('theme-icon');
const openSidebarBtn = document.getElementById('open-sidebar-btn');
const closeSidebarBtn = document.getElementById('close-sidebar-btn');
const sidebar = document.getElementById('sidebar');

const newChatBtn = document.getElementById('new-chat-btn');
const chatList = document.getElementById('chat-list');

const logoutBtn = document.getElementById('logout-btn');
const clearHistoryBtn = document.getElementById('clear-history-btn');
const headerChatTitle = document.getElementById('header-chat-title');
const renameChatBtn = document.getElementById('rename-chat-btn');
const chatContainer = document.getElementById('chat-container');
const chatContent = document.getElementById('chat-content');

const chatInput = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');

// --- INICIALIZAÇÃO ---
function init() {
    applyTheme();
    if (currentUser) {
        showApp();
    } else {
        showAuth();
    }
    lucide.createIcons();
}

// --- SISTEMA DE TEMA ---
function applyTheme() {
    if (isDarkMode) {
        document.documentElement.classList.add('dark');
        themeIcon.setAttribute('data-lucide', 'sun');
    } else {
        document.documentElement.classList.remove('dark');
        themeIcon.setAttribute('data-lucide', 'moon');
    }
    lucide.createIcons();
}

themeToggleBtn.addEventListener('click', () => {
    isDarkMode = !isDarkMode;
    localStorage.setItem('nexus_theme', isDarkMode ? 'dark' : 'light');
    applyTheme();
});

// --- SISTEMA DE AUTENTICAÇÃO ---
function showAuth() {
    authScreen.classList.remove('hidden');
    appScreen.classList.add('hidden');
    updateAuthUI();
}

function showApp() {
    authScreen.classList.add('hidden');
    appScreen.classList.remove('hidden');
    currentUsernameDisplay.textContent = currentUser;
    renderSidebar();
    renderChat();
}

function updateAuthUI() {
    authError.classList.add('hidden');
    if (authMode === 'login') {
        authSubtitle.textContent = 'Faça login para continuar';
        authSubmitBtn.textContent = 'Entrar';
        authSwitchBtn.textContent = 'Não tem uma conta? Cadastre-se';
        apiKeyGroup.classList.add('hidden');
        authApiKeyInput.removeAttribute('required');
    } else {
        authSubtitle.textContent = 'Crie sua conta';
        authSubmitBtn.textContent = 'Cadastrar';
        authSwitchBtn.textContent = 'Já tem uma conta? Faça login';
        apiKeyGroup.classList.remove('hidden');
        authApiKeyInput.setAttribute('required', 'true');
    }
}

authSwitchBtn.addEventListener('click', () => {
    authMode = authMode === 'login' ? 'register' : 'login';
    updateAuthUI();
});

authForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const username = authUsernameInput.value.trim();
    const password = authPasswordInput.value.trim();
    const apiKey = authApiKeyInput.value.trim();

    if (!username || !password) {
        showAuthError('Preencha todos os campos obrigatórios.');
        return;
    }

    const users = JSON.parse(localStorage.getItem('nexus_users') || '{}');
    const apiKeys = JSON.parse(localStorage.getItem('nexus_api_keys') || '{}');

    if (authMode === 'register') {
        if (users[username]) {
            showAuthError('Usuário já existe.');
            return;
        }
        if (!apiKey) {
            showAuthError('A chave da API é obrigatória no cadastro.');
            return;
        }
        users[username] = password;
        apiKeys[username] = apiKey;
        localStorage.setItem('nexus_users', JSON.stringify(users));
        localStorage.setItem('nexus_api_keys', JSON.stringify(apiKeys));
        
        loginUser(username);
    } else {
        if (users[username] === password) {
            loginUser(username);
        } else {
            showAuthError('Credenciais inválidas.');
        }
    }
});

function showAuthError(msg) {
    authError.textContent = msg;
    authError.classList.remove('hidden');
}

function loginUser(username) {
    currentUser = username;
    localStorage.setItem('nexus_current_user', username);
    authUsernameInput.value = '';
    authPasswordInput.value = '';
    authApiKeyInput.value = '';
    showApp();
}

logoutBtn.addEventListener('click', () => {
    currentUser = null;
    currentSessionId = null;
    localStorage.removeItem('nexus_current_user');
    localStorage.removeItem('nexus_current_chat');
    showAuth();
});

// --- SISTEMA DE CHAT (UI) ---
function getUserSessions() {
    return sessions.filter(s => s.userId === currentUser).sort((a, b) => b.updatedAt - a.updatedAt);
}

function getCurrentSession() {
    return sessions.find(s => s.id === currentSessionId && s.userId === currentUser);
}

function saveSessions() {
    localStorage.setItem('nexus_chats', JSON.stringify(sessions));
    if (currentSessionId) {
        localStorage.setItem('nexus_current_chat', currentSessionId);
    } else {
        localStorage.removeItem('nexus_current_chat');
    }
}

function renderSidebar() {
    const userSessions = getUserSessions();
    chatList.innerHTML = '';

    if (userSessions.length === 0) {
        chatList.innerHTML = '<div style="font-size: 0.75rem; color: var(--text-secondary); font-style: italic; padding: 0.5rem;">Nenhuma conversa salva.</div>';
    } else {
        userSessions.forEach(session => {
            const div = document.createElement('div');
            div.className = `chat-item ${session.id === currentSessionId ? 'active' : ''}`;
            div.innerHTML = `<i data-lucide="message-square"></i> <span class="truncate">${session.title}</span>`;
            div.onclick = () => {
                currentSessionId = session.id;
                saveSessions();
                renderSidebar();
                renderChat();
                closeMobileMenu();
            };
            chatList.appendChild(div);
        });
    }
    lucide.createIcons();
}

function renderChat() {
    const session = getCurrentSession();
    chatContent.innerHTML = '';

    if (!session || session.messages.length === 0) {
        headerChatTitle.textContent = 'Nova Conversa';
        renameChatBtn.classList.add('hidden');
        chatContent.innerHTML = `
            <div class="empty-state">
                <h2 class="empty-title">Nexus Unbound AI</h2>
                <p class="empty-desc">Assistente normal por padrão. Mestre de RPG +18 quando solicitado.</p>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="setInputValue('Qual a capital do Brasil?')">Fazer uma pergunta normal.</button>
                    <button class="suggestion-btn" onclick="setInputValue('Me ajude a escrever um código em Python.')">Pedir ajuda com código.</button>
                    <button class="suggestion-btn" onclick="setInputValue('Quero iniciar um RPG de ficção explícita (+18).')">Iniciar um RPG de ficção explícita (+18).</button>
                    <button class="suggestion-btn" onclick="setInputValue('Escreva uma cena adulta detalhada e visceral.')">Escrever cena adulta detalhada.</button>
                </div>
            </div>
        `;
    } else {
        headerChatTitle.textContent = session.title;
        renameChatBtn.classList.remove('hidden');
        session.messages.forEach(msg => {
            const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const isUser = msg.role === 'user';
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `
                <div class="avatar ${isUser ? 'user' : 'ai'}">${isUser ? 'U' : 'N'}</div>
                <div class="message-body">
                    <div class="prose">${isUser ? escapeHTML(msg.content) : marked.parse(msg.content)}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            chatContent.appendChild(msgDiv);
        });
    }

    if (isLoading) {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message loading-indicator';
        loadingDiv.innerHTML = `
            <div class="avatar ai">N</div>
            <div class="loading-bars">
                <div class="loading-bar"></div>
                <div class="loading-bar"></div>
            </div>
        `;
        chatContent.appendChild(loadingDiv);
    }

    chatContainer.scrollTop = chatContainer.scrollHeight;
}

function setInputValue(val) {
    chatInput.value = val;
    updateSendButton();
    chatInput.focus();
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, tag => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag]));
}

function showErrorBanner(msg) {
    const errDiv = document.createElement('div');
    errDiv.className = 'error-banner';
    errDiv.innerHTML = `<i data-lucide="shield-alert" style="width: 20px; height: 20px; flex-shrink: 0;"></i> <div>${msg}</div>`;
    chatContent.appendChild(errDiv);
    lucide.createIcons();
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

// --- ATUALIZAÇÃO DO RESUMO OCULTO (BACKGROUND) ---
async function updateCampaignSummary(session, apiKey) {
    const messagesToSummarize = session.messages.slice(-10);
    let promptText = "Você é um assistente de IA. Sua tarefa é atualizar o resumo oculto desta campanha/conversa.\n\n";
    
    if (session.summary) {
        promptText += "RESUMO ANTERIOR DA HISTÓRIA:\n" + session.summary + "\n\n";
    }
    
    promptText += "ÚLTIMAS 10 MENSAGENS TROCADAS:\n";
    messagesToSummarize.forEach(m => {
        promptText += `${m.role === 'user' ? 'Jogador/Usuário' : 'Mestre/IA'}: ${m.content}\n\n`;
    });
    
    promptText += "INSTRUÇÃO: Escreva um novo resumo atualizado, conciso e direto dos acontecimentos da campanha até agora. Mantenha os detalhes importantes para a continuidade da história (nomes, locais, status, ações recentes). Retorne APENAS o texto do resumo, sem introduções.";

    try {
        const payload = {
            contents: [{ role: 'user', parts: [{ text: promptText }] }],
            generationConfig: { temperature: 0.3 }
        };

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            const data = await response.json();
            if (data.candidates && data.candidates[0].content) {
                session.summary = data.candidates[0].content.parts[0].text;
                saveSessions();
                console.log("Resumo da campanha atualizado com sucesso em segundo plano.");
            }
        }
    } catch (e) {
        console.error("Erro ao atualizar o resumo da campanha:", e);
    }
}

// --- INTERAÇÕES E LÓGICA DE API ---
chatInput.addEventListener('input', updateSendButton);

function updateSendButton() {
    sendBtn.disabled = chatInput.value.trim() === '' || isLoading;
}

newChatBtn.addEventListener('click', () => {
    currentSessionId = null;
    saveSessions();
    renderSidebar();
    renderChat();
    closeMobileMenu();
});

// Renomear Conversa
renameChatBtn.addEventListener('click', () => {
    if (!currentSessionId) return;
    const session = getCurrentSession();
    const newName = prompt("Digite o novo nome para a conversa:", session.title);
    if (newName && newName.trim() !== "") {
        session.title = newName.trim();
        saveSessions();
        renderSidebar();
        renderChat();
    }
});

clearHistoryBtn.addEventListener('click', () => {
    if(confirm('Tem certeza que deseja apagar todo o seu histórico?')) {
        sessions = sessions.filter(s => s.userId !== currentUser);
        currentSessionId = null;
        saveSessions();
        renderSidebar();
        renderChat();
        closeMobileMenu();
    }
});

chatForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const text = chatInput.value.trim();
    if (!text || isLoading) return;

    // Obter API Key do usuário atual
    const apiKeys = JSON.parse(localStorage.getItem('nexus_api_keys') || '{}');
    const apiKey = apiKeys[currentUser];

    if (!apiKey) {
        alert("Chave de API não encontrada. Por favor, faça login novamente.");
        logoutBtn.click();
        return;
    }

    const userMessage = {
        id: Date.now().toString(),
        role: 'user',
        content: text,
        timestamp: Date.now()
    };

    let isNewSession = false;
    if (!currentSessionId) {
        currentSessionId = Date.now().toString();
        isNewSession = true;
        sessions.unshift({
            id: currentSessionId,
            title: text.substring(0, 40) + (text.length > 40 ? '...' : ''),
            messages: [userMessage],
            summary: "", // Inicializa o resumo vazio
            updatedAt: Date.now(),
            userId: currentUser
        });
    } else {
        const session = getCurrentSession();
        session.messages.push(userMessage);
        session.updatedAt = Date.now();
        // Move to top
        sessions = sessions.filter(s => s.id !== currentSessionId);
        sessions.unshift(session);
    }

    chatInput.value = '';
    updateSendButton();
    isLoading = true;
    saveSessions();
    renderSidebar();
    renderChat();

    try {
        const session = getCurrentSession();
        
        // --- MEMÓRIA INTELIGENTE (RESUMO + ÚLTIMAS 10 MENSAGENS) ---
        // Pega apenas as últimas 10 mensagens para enviar à API
        const recentMessages = session.messages.slice(-10);
        
        const historyForApi = recentMessages.map(m => ({
            role: m.role === 'user' ? 'user' : 'model',
            parts: [{ text: m.content }]
        }));

        // Constrói a Instrução do Sistema com o Resumo Oculto (se existir)
        let currentSystemInstruction = BASE_SYSTEM_INSTRUCTION;
        if (session.summary && session.summary.trim() !== "") {
            currentSystemInstruction += "\n\n--- RESUMO DA CAMPANHA ATÉ AGORA (Use isso para lembrar do contexto) ---\n" + session.summary;
        }

        const payload = {
            systemInstruction: {
                parts: [{ text: currentSystemInstruction }]
            },
            contents: historyForApi,
            safetySettings: [
                { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
            ],
            generationConfig: { temperature: 0.9, topP: 0.95, topK: 40 }
        };

        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            const errData = await response.json();
            throw new Error(errData.error?.message || 'Erro de comunicação com a API Gemini.');
        }

        const data = await response.json();
        
        if (data.candidates && data.candidates[0].content) {
            const aiText = data.candidates[0].content.parts[0].text;
            session.messages.push({
                id: Date.now().toString(),
                role: 'model',
                content: aiText,
                timestamp: Date.now()
            });
            session.updatedAt = Date.now();
            
            // --- GATILHO DO RESUMO EM SEGUNDO PLANO ---
            // Se o número de mensagens for múltiplo de 10, atualiza o resumo oculto
            if (session.messages.length > 0 && session.messages.length % 10 === 0) {
                updateCampaignSummary(session, apiKey);
            }

        } else {
            throw new Error("O modelo bloqueou a resposta ou retornou vazio.");
        }

    } catch (error) {
        console.error(error);
        isLoading = false;
        renderChat(); // Remove loading
        showErrorBanner(error.message);
        return; // Stop execution here so we don't re-render normally over the error
    }

    isLoading = false;
    saveSessions();
    renderSidebar();
    renderChat();
});

// --- MOBILE MENU ---
function openMobileMenu() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
}

function closeMobileMenu() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
}

openSidebarBtn.addEventListener('click', openMobileMenu);
closeSidebarBtn.addEventListener('click', closeMobileMenu);
sidebarOverlay.addEventListener('click', closeMobileMenu);

// Iniciar App
init();
    </script>
